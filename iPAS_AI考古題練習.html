<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AI考古題">
    <link rel="manifest" href="manifest.json">
    <title>iPAS AI應用規劃師（初級）考古題練習</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-light: #dbeafe;
            --success: #16a34a;
            --success-light: #dcfce7;
            --danger: #dc2626;
            --danger-light: #fee2e2;
            --warning: #f59e0b;
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.65;
            min-height: 100vh;
        }
        .container { max-width: 880px; margin: 0 auto; padding: 16px; }

        /* Header */
        header {
            text-align: center;
            padding: 36px 20px 28px;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #60a5fa 100%);
            color: white;
            border-radius: 0 0 20px 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 24px rgba(30,58,138,0.25);
        }
        header h1 { font-size: 1.7em; font-weight: 800; margin-bottom: 6px; }
        header p { opacity: 0.9; font-size: 1em; }
        .stats-bar {
            display: flex; justify-content: center; gap: 20px; margin-top: 16px; flex-wrap: wrap;
        }
        .stat-item {
            background: rgba(255,255,255,0.18); padding: 6px 16px; border-radius: 16px; font-size: 0.9em;
        }
        .stat-item strong { font-weight: 700; }

        /* 離線狀態指示器 */
        .offline-indicator {
            display: none;
            background: rgba(245, 158, 11, 0.95);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-top: 10px;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(4px);
        }
        .offline-indicator.show { display: inline-flex; }
        .offline-indicator::before {
            content: '📴';
            font-size: 1.1em;
        }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 12px 32px; font-size: 1.05em; font-weight: 600;
            border: none; border-radius: 12px; cursor: pointer;
            transition: all 0.2s; text-decoration: none;
        }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(37,99,235,0.3); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #15803d; }
        .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
        .btn-outline:hover { background: var(--primary); color: white; }
        .btn-sm { padding: 8px 18px; font-size: 0.9em; }

        /* Start Screen */
        .start-screen { text-align: center; padding: 40px 20px; }
        .start-screen h2 { font-size: 1.5em; margin-bottom: 12px; }
        .start-screen p { color: var(--text-secondary); margin-bottom: 8px; }

        .config-section {
            margin: 24px auto; max-width: 480px;
            background: var(--card); padding: 24px; border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .config-section label {
            display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.95em;
        }
        .config-section select {
            width: 100%; padding: 10px 14px; border: 2px solid var(--border);
            border-radius: 10px; font-size: 0.95em; margin-bottom: 14px;
            background: white; transition: border-color 0.2s;
        }
        .config-section select:focus { outline: none; border-color: var(--primary); }

        /* Progress */
        .progress-container {
            background: var(--card); border-radius: 14px; padding: 16px 20px;
            margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .progress-header {
            display: flex; justify-content: space-between; margin-bottom: 8px;
            font-size: 0.9em; color: var(--text-secondary);
        }
        .progress-bar { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #3b82f6, #2563eb);
            border-radius: 3px; transition: width 0.4s ease;
        }

        /* Question Nav Grid */
        .q-nav-grid {
            display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin: 12px 0 4px;
        }
        .q-nav-btn {
            width: 36px; height: 36px; border-radius: 8px; border: 2px solid var(--border);
            background: var(--card); cursor: pointer; font-weight: 600; font-size: 0.85em;
            display: flex; align-items: center; justify-content: center; transition: all 0.15s;
        }
        .q-nav-btn:hover { border-color: var(--primary); }
        .q-nav-btn.answered { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
        .q-nav-btn.current { background: var(--primary); border-color: var(--primary); color: white; }

        /* Question Card */
        .question-card {
            background: var(--card); border-radius: 16px; padding: 28px;
            margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .question-number {
            display: inline-block; background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white; padding: 3px 14px; border-radius: 16px;
            font-size: 0.82em; font-weight: 600; margin-bottom: 14px;
        }
        .question-text { font-size: 1.1em; line-height: 1.75; margin-bottom: 20px; font-weight: 500; }
        .options-list { list-style: none; }
        .option-item { margin-bottom: 10px; }
        .option-label {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 13px 16px; border: 2px solid var(--border); border-radius: 12px;
            cursor: pointer; transition: all 0.15s; font-size: 1em;
        }
        .option-label:hover { border-color: var(--primary); background: #f0f7ff; }
        .option-label input { display: none; }
        .option-marker {
            flex-shrink: 0; width: 30px; height: 30px; border: 2px solid var(--border);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85em; transition: all 0.15s;
        }
        .option-text { padding-top: 3px; flex: 1; }
        .option-label.selected { border-color: var(--primary); background: #eff6ff; }
        .option-label.selected .option-marker {
            background: var(--primary); border-color: var(--primary); color: white;
        }
        .option-label.correct { border-color: var(--success); background: var(--success-light); }
        .option-label.correct .option-marker { background: var(--success); border-color: var(--success); color: white; }
        .option-label.wrong { border-color: var(--danger); background: var(--danger-light); }
        .option-label.wrong .option-marker { background: var(--danger); border-color: var(--danger); color: white; }

        /* Nav Buttons */
        .nav-buttons { display: flex; justify-content: space-between; gap: 10px; margin-top: 6px; }
        .nav-buttons .btn { flex: 1; justify-content: center; }

        /* Results */
        .results-screen { display: none; }
        .score-card {
            text-align: center; background: var(--card); border-radius: 20px;
            padding: 36px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .score-circle {
            width: 150px; height: 150px; border-radius: 50%; margin: 0 auto 16px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 2.6em; font-weight: 800; color: white;
            box-shadow: 0 6px 24px rgba(0,0,0,0.15);
        }
        .score-circle.pass { background: linear-gradient(135deg, #16a34a, #4ade80); }
        .score-circle.fail { background: linear-gradient(135deg, #dc2626, #f87171); }
        .score-circle small { font-size: 0.28em; font-weight: 500; opacity: 0.9; }
        .score-details {
            display: flex; justify-content: center; gap: 36px; margin-top: 16px; flex-wrap: wrap;
        }
        .score-detail { text-align: center; }
        .score-detail .num { font-size: 1.7em; font-weight: 700; }
        .score-detail .label { color: var(--text-secondary); font-size: 0.88em; }
        .score-detail .num.c-green { color: var(--success); }
        .score-detail .num.c-red { color: var(--danger); }

        /* Review Cards */
        .review-card {
            background: var(--card); border-radius: 14px; padding: 22px;
            margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
            border-left: 4px solid var(--border);
        }
        .review-card.rc-correct { border-left-color: var(--success); }
        .review-card.rc-wrong { border-left-color: var(--danger); }
        .review-badge {
            display: inline-block; padding: 2px 10px; border-radius: 16px;
            font-size: 0.78em; font-weight: 600; margin-bottom: 10px;
        }
        .badge-correct { background: var(--success-light); color: #166534; }
        .badge-wrong { background: var(--danger-light); color: #991b1b; }
        .review-question { font-weight: 600; margin-bottom: 10px; font-size: 1.02em; line-height: 1.6; }
        .review-info { font-size: 0.93em; color: var(--text-secondary); line-height: 1.7; }
        .review-info p { margin-bottom: 4px; }
        .review-info strong { color: var(--text); }
        .analysis-box {
            background: #f8fafc; border: 1px solid var(--border); border-radius: 10px;
            padding: 12px 16px; margin-top: 8px; font-size: 0.9em; line-height: 1.7;
        }
        .source-tag {
            display: inline-block; background: #eff6ff; color: var(--primary);
            padding: 2px 10px; border-radius: 6px; font-size: 0.8em; margin-top: 8px;
        }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn {
            padding: 7px 16px; border: 2px solid var(--border); border-radius: 10px;
            background: var(--card); cursor: pointer; font-size: 0.88em; font-weight: 500;
            transition: all 0.15s;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--primary); background: #eff6ff; color: var(--primary);
        }

        .timer { font-size: 1.05em; font-weight: 600; color: var(--primary); }
        .hidden { display: none !important; }

        /* 行動裝置觸控優化 */
        .btn, .option-label, .q-nav-btn {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }
        .btn:active, .option-label:active, .q-nav-btn:active {
            transform: scale(0.98);
        }
        /* 防止iOS上的橡皮筋效果 */
        body {
            overscroll-behavior-y: none;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 640px) {
            .container { padding: 8px; }
            header { padding: 24px 16px 20px; border-radius: 0 0 16px 16px; }
            header h1 { font-size: 1.2em; }
            header p { font-size: 0.9em; }
            .stats-bar { gap: 10px; margin-top: 12px; }
            .stat-item { padding: 4px 12px; font-size: 0.85em; }
            .question-card { padding: 16px; margin-bottom: 12px; }
            .question-text { font-size: 1em; line-height: 1.6; }
            .option-label { padding: 12px; gap: 10px; }
            .option-marker { width: 26px; height: 26px; font-size: 0.8em; }
            .nav-buttons { flex-direction: column; gap: 8px; }
            .nav-buttons .btn { padding: 14px; }
            .config-section { padding: 16px; margin: 16px 8px; }
            .score-circle { width: 120px; height: 120px; font-size: 2em; }
            .score-details { gap: 14px; }
            .score-detail .num { font-size: 1.4em; }
            .q-nav-btn { width: 32px; height: 32px; font-size: 0.8em; }
            .btn { padding: 12px 24px; font-size: 1em; }
            .btn-sm { padding: 8px 14px; font-size: 0.85em; }
            .review-card { padding: 16px; }
            .start-screen { padding: 24px 12px; }
            .start-screen h2 { font-size: 1.2em; }
            .progress-container { padding: 12px 14px; }
            .offline-indicator { font-size: 0.8em; padding: 5px 12px; }
        }

        /* 安裝提示樣式 */
        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: none;
            align-items: center;
            gap: 16px;
            z-index: 1000;
            max-width: 90%;
            width: 360px;
        }
        .install-prompt.show { display: flex; }
        .install-prompt-icon { font-size: 2em; }
        .install-prompt-text { flex: 1; }
        .install-prompt-text strong { display: block; margin-bottom: 4px; }
        .install-prompt-text small { color: var(--text-secondary); }
        .install-prompt-close {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            padding: 4px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header>
        <h1>iPAS AI應用規劃師（初級）</h1>
        <p>考古題練習系統</p>
        <div class="stats-bar">
            <div class="stat-item">📚 題庫 <strong id="totalCount">0</strong> 題</div>
            <div class="stat-item">🎯 及格 <strong>70</strong> 分</div>
            <div class="stat-item" id="timerDisplay" class="hidden">⏱️ <span class="timer" id="timer">00:00</span></div>
        </div>
        <div class="offline-indicator" id="offlineIndicator">離線模式</div>
    </header>
    <div class="container">
        <div id="startScreen" class="start-screen">
            <h2>開始練習</h2>
            <p>從題庫中隨機抽取題目進行模擬測驗</p>
            <div class="config-section">
                <label>📋 出題數量</label>
                <select id="questionCount">
                    <option value="10">10 題（快速練習）</option>
                    <option value="20" selected>20 題（標準練習）</option>
                    <option value="30">30 題（強化練習）</option>
                    <option value="50">50 題（模擬考試）</option>
                </select>
                <label>📂 出題範圍</label>
                <select id="sourceFilter">
                    <option value="all">全部範圍</option>
                    <option value="第一篇">第一篇：人工智慧基礎概論</option>
                    <option value="第二篇">第二篇：生成式AI應用與規劃</option>
                </select>
                <label>⏱️ 計時模式</label>
                <select id="timerEnabled">
                    <option value="no">不計時</option>
                    <option value="yes">計時模式（75分鐘）</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="startQuiz()">🚀 開始測驗</button>
        </div>

        <div id="quizScreen" class="hidden">
            <div class="progress-container">
                <div class="progress-header">
                    <span>進度 <strong id="currentQ">1</strong> / <strong id="totalQ">20</strong></span>
                    <span>已答 <strong id="answeredCount">0</strong> 題</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:5%"></div></div>
                <div class="q-nav-grid" id="qNavGrid"></div>
            </div>
            <div id="questionContainer"></div>
            <div class="nav-buttons">
                <button class="btn btn-outline" id="prevBtn" onclick="prevQ()">⬅ 上一題</button>
                <button class="btn btn-primary" id="nextBtn" onclick="nextQ()">下一題 ➡</button>
                <button class="btn btn-success hidden" id="submitBtn" onclick="submitQuiz()">📊 交卷</button>
            </div>
        </div>

        <div id="resultsScreen" class="results-screen">
            <div class="score-card">
                <div class="score-circle" id="scoreCircle"><span id="scorePercent">0</span><small>分</small></div>
                <h2 id="scoreMessage">成績報告</h2>
                <div class="score-details">
                    <div class="score-detail"><div class="num c-green" id="correctCount">0</div><div class="label">答對</div></div>
                    <div class="score-detail"><div class="num c-red" id="wrongCount">0</div><div class="label">答錯</div></div>
                    <div class="score-detail"><div class="num" id="totalTime">-</div><div class="label">用時</div></div>
                </div>
            </div>
            <div class="filter-bar">
                <button class="filter-btn active" onclick="filterReview('all',this)">全部</button>
                <button class="filter-btn" onclick="filterReview('wrong',this)">❌ 僅看錯題</button>
                <button class="filter-btn" onclick="filterReview('correct',this)">✅ 僅看對題</button>
            </div>
            <div id="reviewContainer"></div>
            <div style="text-align:center;margin:28px 0 40px;">
                <button class="btn btn-primary" onclick="resetQuiz()">🔄 再測一次</button>
            </div>
        </div>
    </div>

// 頁面載入完成後執行
document.addEventListener('DOMContentLoaded', function() {
    // 顯示總題數
    const totalCountEl = document.getElementById('totalCount');
    if (totalCountEl && typeof ALL_QUESTIONS !== 'undefined') {
        totalCountEl.textContent = ALL_QUESTIONS.length;
    }
    console.log('頁面載入完成，題目數:', typeof ALL_QUESTIONS !== 'undefined' ? ALL_QUESTIONS.length : 0);
});

let curQs = [], curIdx = 0, answers = {}, timerInt = null, startT = null, elapsed = 0;

function shuffle(a) {
    const b = [...a];
    for (let i = b.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [b[i], b[j]] = [b[j], b[i]];
    }
    return b;
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

function startQuiz() {
    try {
        console.log('開始測驗...');

        // 檢查必要的元素是否存在
        const questionCountEl = document.getElementById('questionCount');
        const sourceFilterEl = document.getElementById('sourceFilter');
        const timerEnabledEl = document.getElementById('timerEnabled');
        const startScreenEl = document.getElementById('startScreen');
        const quizScreenEl = document.getElementById('quizScreen');
        const resultsScreenEl = document.getElementById('resultsScreen');

        if (!questionCountEl || !sourceFilterEl || !startScreenEl || !quizScreenEl) {
            console.error('找不到必要的 DOM 元素');
            alert('頁面載入不完整，請重新整理後再試');
            return;
        }

        // 檢查題目資料
        if (typeof ALL_QUESTIONS === 'undefined' || !ALL_QUESTIONS || !ALL_QUESTIONS.length) {
            console.error('題目資料未載入');
            alert('題目資料載入失敗，請確認網路連線或重新整理頁面');
            return;
        }

        const count = parseInt(questionCountEl.value, 10) || 20;
        const src = sourceFilterEl.value || 'all';
        const timerOn = timerEnabledEl ? timerEnabledEl.value === 'yes' : false;

        let pool = src === 'all' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.source && q.source.includes(src));

        if (!pool.length) {
            alert('所選範圍沒有題目');
            return;
        }

        // 打亂題目順序並選取
        curQs = shuffle(pool).slice(0, Math.min(count, pool.length));
        curIdx = 0;
        answers = {};

        // 切換畫面
        startScreenEl.classList.add('hidden');
        quizScreenEl.classList.remove('hidden');
        if (resultsScreenEl) {
            resultsScreenEl.style.display = 'none';
        }

        // 更新總題數
        const totalQEl = document.getElementById('totalQ');
        if (totalQEl) totalQEl.textContent = curQs.length;

        // 設定計時器
        if (timerOn) {
            const timerDisplayEl = document.getElementById('timerDisplay');
            if (timerDisplayEl) timerDisplayEl.classList.remove('hidden');
            startT = Date.now();
            elapsed = 0;
            if (timerInt) clearInterval(timerInt);
            timerInt = setInterval(() => {
                elapsed++;
                const timerEl = document.getElementById('timer');
                if (timerEl) {
                    timerEl.textContent = String(Math.floor(elapsed/60)).padStart(2,'0') + ':' + String(elapsed%60).padStart(2,'0');
                }
                if (elapsed >= 4500) {
                    clearInterval(timerInt);
                    alert('時間到！');
                    submitQuiz();
                }
            }, 1000);
        } else {
            const timerDisplayEl = document.getElementById('timerDisplay');
            if (timerDisplayEl) timerDisplayEl.classList.add('hidden');
            startT = Date.now();
        }

        buildNav();
        renderQ();
        console.log('測驗開始成功，題目數:', curQs.length);

    } catch (error) {
        console.error('開始測驗時發生錯誤:', error);
        alert('開始測驗時發生錯誤: ' + error.message);
    }
}

function buildNav() {
    const g = document.getElementById('qNavGrid'); g.innerHTML = '';
    curQs.forEach((_, i) => {
        const b = document.createElement('button'); b.className = 'q-nav-btn'; b.textContent = i+1;
        b.onclick = () => { curIdx = i; renderQ(); }; g.appendChild(b);
    });
}

function updateNav() {
    document.querySelectorAll('.q-nav-btn').forEach((b, i) => {
        b.className = 'q-nav-btn' + (i === curIdx ? ' current' : answers[i] !== undefined ? ' answered' : '');
    });
    document.getElementById('answeredCount').textContent = Object.keys(answers).length;
}

function renderQ() {
    const q = curQs[curIdx], c = document.getElementById('questionContainer');
    let opts = '';
    ['A','B','C','D'].forEach(k => {
        if (q.options[k]) {
            opts += `<li class="option-item"><label class="option-label${answers[curIdx]===k?' selected':''}" id="o${curIdx}_${k}" onclick="sel(${curIdx},'${k}')">
                <input type="radio" name="q${curIdx}" value="${k}"${answers[curIdx]===k?' checked':''}>
                <span class="option-marker">${k}</span><span class="option-text">${esc(q.options[k])}</span>
            </label></li>`;
        }
    });
    c.innerHTML = `<div class="question-card"><span class="question-number">第 ${curIdx+1} 題 / ${curQs.length} 題</span>
        <div class="question-text">${esc(q.question)}</div><ul class="options-list">${opts}</ul></div>`;
    document.getElementById('currentQ').textContent = curIdx + 1;
    document.getElementById('progressFill').style.width = ((curIdx+1)/curQs.length*100)+'%';
    document.getElementById('prevBtn').style.visibility = curIdx > 0 ? 'visible' : 'hidden';
    const last = curIdx === curQs.length - 1;
    const allDone = Object.keys(answers).length >= curQs.length;
    document.getElementById('nextBtn').classList.toggle('hidden', last);
    document.getElementById('submitBtn').classList.toggle('hidden', !last && !allDone);
    updateNav();
}

function sel(qi, opt) {
    answers[qi] = opt;
    ['A','B','C','D'].forEach(k => {
        const el = document.getElementById(`o${qi}_${k}`);
        if (el) { el.classList.toggle('selected', k===opt); el.querySelector('input').checked = k===opt; }
    });
    updateNav();
    if (Object.keys(answers).length >= curQs.length) document.getElementById('submitBtn').classList.remove('hidden');
}

function nextQ() { if (curIdx < curQs.length-1) { curIdx++; renderQ(); window.scrollTo({top:0,behavior:'smooth'}); } }
function prevQ() { if (curIdx > 0) { curIdx--; renderQ(); window.scrollTo({top:0,behavior:'smooth'}); } }

function submitQuiz() {
    const un = curQs.length - Object.keys(answers).length;
    if (un > 0 && !confirm(`還有 ${un} 題未答，確定交卷？`)) return;
    if (timerInt) clearInterval(timerInt);
    let correct = 0;
    const results = curQs.map((q, i) => {
        const ua = answers[i] || '未作答', ok = ua === q.answer;
        if (ok) correct++;
        return { idx: i+1, question: q.question, options: q.options, answer: q.answer,
                  userAnswer: ua, isCorrect: ok, analysis: q.analysis, source: q.source };
    });
    const score = Math.round(correct/curQs.length*100), pass = score >= 70;
    document.getElementById('quizScreen').classList.add('hidden');
    document.getElementById('resultsScreen').style.display = 'block';
    document.getElementById('scoreCircle').className = 'score-circle ' + (pass?'pass':'fail');
    document.getElementById('scorePercent').textContent = score;
    document.getElementById('scoreMessage').textContent = pass ? '🎉 恭喜通過！' : '💪 繼續加油！';
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('wrongCount').textContent = curQs.length - correct;
    if (startT) {
        const s = Math.round((Date.now()-startT)/1000);
        document.getElementById('totalTime').textContent = Math.floor(s/60)+'分'+s%60+'秒';
    }
    window._results = results;
    renderReview(results);
    window.scrollTo({top:0,behavior:'smooth'});
}

function renderReview(rs) {
    const c = document.getElementById('reviewContainer'); c.innerHTML = '';
    rs.forEach(r => {
        const d = document.createElement('div');
        d.className = `review-card ${r.isCorrect?'rc-correct':'rc-wrong'}`;
        d.setAttribute('data-type', r.isCorrect?'correct':'wrong');
        let opts = '';
        ['A','B','C','D'].forEach(k => {
            if (r.options[k]) {
                let mark = '';
                if (k===r.answer && k===r.userAnswer) mark=' ✅';
                else if (k===r.answer) mark=' ✅ 正確答案';
                else if (k===r.userAnswer) mark=' ❌ 你的選擇';
                opts += `<p>(${k}) ${esc(r.options[k])}${mark}</p>`;
            }
        });
        d.innerHTML = `<span class="review-badge ${r.isCorrect?'badge-correct':'badge-wrong'}">${r.isCorrect?'✅ 正確':'❌ 錯誤'}</span>
            <div class="review-question">第${r.idx}題：${esc(r.question)}</div>
            <div class="review-info">${opts}
                <p><strong>正確答案：</strong>(${r.answer}) ${esc(r.options[r.answer]||'')}</p>
                <p><strong>你的答案：</strong>${r.userAnswer==='未作答'?'未作答':'('+r.userAnswer+') '+esc(r.options[r.userAnswer]||'')}</p>
                <div class="analysis-box"><strong>📖 解析：</strong>${esc(r.analysis)}</div>
                <div class="source-tag">📍 ${esc(r.source)}</div>
            </div>`;
        c.appendChild(d);
    });
}

function filterReview(t, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderReview(t==='all' ? window._results : window._results.filter(r => t==='correct'?r.isCorrect:!r.isCorrect));
}

function resetQuiz() {
    document.getElementById('resultsScreen').style.display = 'none';
    document.getElementById('startScreen').classList.remove('hidden');
    window.scrollTo({top:0,behavior:'smooth'});
}

// 註冊 Service Worker 以支援離線使用
if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('./sw.js')
            .then(function(reg) {
                console.log('Service Worker 註冊成功:', reg.scope);
                // 檢查是否有更新
                reg.addEventListener('updatefound', function() {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', function() {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            console.log('發現新版本，請重新整理頁面以更新');
                        }
                    });
                });
            })
            .catch(function(err) {
                console.log('Service Worker 註冊失敗:', err);
            });
    });
}

// PWA 安裝提示
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // 顯示安裝提示
    const promptEl = document.getElementById('installPrompt');
    if (promptEl) promptEl.classList.add('show');
});

// 離線狀態偵測
function updateOnlineStatus() {
    const indicator = document.getElementById('offlineIndicator');
    if (!indicator) return;

    if (!navigator.onLine) {
        indicator.classList.add('show');
        console.log('進入離線模式');
    } else {
        indicator.classList.remove('show');
        console.log('恢復連線');
    }
}

window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
// 頁面載入時也檢查一次
updateOnlineStatus();

function installPWA() {
    if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(choice => {
            if (choice.outcome === 'accepted') {
                console.log('使用者接受安裝');
            }
            deferredPrompt = null;
            document.getElementById('installPrompt').classList.remove('show');
        });
    }
}

function closeInstallPrompt() {
    document.getElementById('installPrompt').classList.remove('show');
}
</script>
